<!DOCTYPE html>
<html>
<head>
    <title>Admin View - Support Session</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; padding: 15px; }
        video { border: 1px solid #ccc; margin-top: 20px; width: 90%; max-width: 600px; height: auto; }
        #status { color: blue; font-weight: bold; margin-top: 10px; }
        #adminPeerId { font-size: 0.9em; color: gray; margin-top: 10px; word-break: break-all; }
        .warning { color: red; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Admin View - Connecting...</h1>
    <video id="remoteVideo" autoplay playsinline></video>
    <p id="status">Waiting to connect to user...</p>
    <p id="adminPeerId">User ID not loaded.</p>
    <p class="warning">Ensure you granted camera/mic access if you wish to share your stream.</p>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const PEERJS_HOST = 'peerjs.com'; // Используем публичный сервер PeerJS
        const PEERJS_PORT = 443;        // Порт для HTTPS
        const PEERJS_PATH = '/';        // Путь для подключения

        const peer = new Peer({
            host: PEERJS_HOST,
            port: PEERJS_PORT,
            path: PEERJS_PATH,
            debug: 2
        });

        let adminLocalStream = null; // Поток камеры админа (если админ тоже передает видео)

        // 1. Получаем ID пользователя из URL
        const urlParams = new URLSearchParams(window.location.search);
        const userPeerId = urlParams.get('peerid');

        if (!userPeerId) {
            document.getElementById('status').textContent = "Error: User ID not provided in URL.";
            document.getElementById('status').style.color = "red";
            alert("Error: User ID not provided in URL. Please use the link generated by the bot.");
        } else {
            document.getElementById('adminPeerId').textContent = `Connecting to user ID: ${userPeerId}`;

            // 2. Администратор запрашивает доступ к своей камере (опционально)
            // Если админ хочет передавать видео, он должен разрешить доступ
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    adminLocalStream = stream;
                                      // Можно отобразить видео админа на его стороне, если хотите
                    // document.getElementById('localAdminVideo').srcObject = stream;
                    console.log('Admin media devices are ready.');
                })
                .catch((err) => {
                    console.error("Error accessing admin's media devices:", err);
                    document.getElementById('status').textContent = `Admin media error: ${err.name}. You can still view the user.`;
                    document.getElementById('status').style.color = "orange";
                    // Продолжаем, даже если админ не дал доступ к своей камере/микрофону
                });

            // 3. Когда PeerJS админа готов
            peer.on('open', (id) => {
                console.log('Admin Peer ID is: ' + id);
                document.getElementById('status').textContent = `Admin connected (ID: ${id}). Calling user...`;

                // 4. Делаем звонок пользователю, передавая поток админа (если есть)
                const call = peer.call(userPeerId, adminLocalStream);
                console.log(`Calling user with ID: ${userPeerId}`);

                call.on('stream', (remoteStream) => {
                    console.log('Received remote stream from user.');
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('status').textContent = "Connected! Viewing user's camera.";
                    document.getElementById('status').style.color = "green";
                });

                call.on('close', () => {
                    console.log('Call ended by user or admin.');
                    document.getElementById('status').textContent = "User has disconnected.";
                    document.getElementById('status').style.color = "orange";
                });
            });

            peer.on('error', (err) => {
                console.error('PeerJS error (admin):', err);
                document.getElementById('status').textContent = `Connection error: ${err.message}`;
                document.getElementById('status').style.color = "red";
                alert(`PeerJS connection error: ${err.message}. Please check your internet connection and try again.`);
            });
        }
    </script>
</body>
</html>
